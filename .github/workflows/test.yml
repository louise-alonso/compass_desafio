name: Testes Automatizados — ServeRest API

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Executar Suíte de Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Executa os testes UMA VEZ e gera o HTML junto
      - name: Executar testes com relatório HTML
        run: |
          pytest tests/ -v --tb=short --html=reports/report.html --self-contained-html

      # Publica o relatório como artefato (download no GitHub)
      - name: Publicar relatório como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-de-testes
          path: reports/report.html